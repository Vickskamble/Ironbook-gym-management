name: ironbook
description: "A SaaS Multi-Gym Management App"
publish_to: 'none'
version: 1.0.1


environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.4.0
  flutter_dotenv: ^6.0.1
  go_router: ^17.3.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  image_picker: ^1.0.0
  percent_indicator: ^4.2.3
  lottie: ^3.1.0
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  animate_do: ^5.1.0
  excel: ^4.0.0
  pdf: ^3.12.0
  printing: ^5.13.0
  cached_network_image: ^3.3.1
  file_picker: ^11.0.2
  connectivity_plus: ^7.2.0
  url_launcher: ^6.2.0
  razorpay_flutter: ^1.4.0
  path_provider: ^2.1.0
  open_filex: ^4.5.0
  flutter_localizations:
    sdk: flutter
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0
  flutter_local_notifications: ^18.0.0
  uuid: ^4.0.0
  sentry_flutter: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_native_splash:
  color: "#0A0A0F"
  android_12:
    color: "#0A0A0F"
  ios: true
  web: false