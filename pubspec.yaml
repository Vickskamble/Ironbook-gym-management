name: ironbook
description: "A SaaS Multi-Gym Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.4.0
  flutter_dotenv: ^5.1.0
  go_router: ^12.0.0
  shared_preferences: ^2.2.0
  intl: ^0.20.2
  image_picker: ^1.0.0
  percent_indicator: ^4.2.3
  lottie: ^3.1.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  animate_do: ^3.3.4
  excel: ^4.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  cached_network_image: ^3.3.1
  file_picker: ^8.0.0
  connectivity_plus: ^6.1.4
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_native_splash:
  color: "#0A0A0F"
  android_12:
    color: "#0A0A0F"
  ios: true
  web: false